services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tuning
      POSTGRES_USER: tuning_user
      POSTGRES_PASSWORD: 911
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # другой внешний порт, чтобы не конфликтовать с Проектом 9

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"  # тоже смещаем, если Проект 9 может быть поднят одновременно
    depends_on:
      - db
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data: